name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */6 * *'  # 6일마다 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -si \
            "${{ secrets.SUPABASE_URL }}/rest/v1/employee_type" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
